name: release

# Publishes deepseek-loop to crates.io and creates a GitHub Release when a
# version tag is pushed (e.g. `git tag v0.5.0 && git push origin v0.5.0`).
#
# Why the dual checkout: this crate has no own [workspace] and inherits 18
# `workspace = true` deps from the v9ai/ai-apps monorepo root. `cargo publish`
# must therefore run with that workspace present — a standalone checkout of
# this repo alone cannot resolve the deps. So CI reconstructs the local
# layout: ai-apps/ (workspace root) with this repo's tagged commit overlaid
# at ai-apps/crates/deepseek-loop. cargo dereferences the workspace deps into
# concrete versions in the published manifest, so crates.io consumers are
# unaffected.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CARGO_REGISTRY_TOKEN  - crates.io API token (Account Settings → API Tokens)
#   WORKSPACE_REPO_TOKEN  - token with READ access to v9ai/ai-apps. If
#                           v9ai/ai-apps is public you may instead replace
#                           ${{ secrets.WORKSPACE_REPO_TOKEN }} below with
#                           ${{ secrets.GITHUB_TOKEN }}.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release on this repo

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out ai-apps workspace root
        uses: actions/checkout@v4
        with:
          repository: v9ai/ai-apps
          token: ${{ secrets.WORKSPACE_REPO_TOKEN }}
          path: ai-apps
          submodules: false

      - name: Overlay this repo's tagged commit at crates/deepseek-loop
        uses: actions/checkout@v4
        with:
          # No `repository:` → this repo (v9ai/deepseek-loop) at the pushed tag.
          path: ai-apps/crates/deepseek-loop

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ai-apps/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('ai-apps/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Verify tag matches Cargo.toml version
        working-directory: ai-apps/crates/deepseek-loop
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag manifest=$manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $manifest"
            exit 1
          fi

      - name: Test (default features)
        working-directory: ai-apps/crates/deepseek-loop
        run: cargo test --verbose

      - name: Publish to crates.io
        working-directory: ai-apps/crates/deepseek-loop
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Extract changelog section for this version
        working-directory: ai-apps/crates/deepseek-loop
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          # Lines from the matching `## <ver>` header up to (not incl.) the next `## ` header.
          awk -v ver="$ver" '
            $0 ~ "^## " ver " " {f=1; next}
            f && /^## / {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        working-directory: ai-apps/crates/deepseek-loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
